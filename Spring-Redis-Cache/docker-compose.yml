services:
  redis:
    image: redis:8.6.1
    container_name: redis
    command: >
      redis-server
      --requirepass duytc
      --appendonly yes
      --appendfsync everysec
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
    ports:
      - "6379:6379"   # bỏ nếu chạy internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a duytc ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data: